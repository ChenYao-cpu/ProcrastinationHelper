<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>拖延症拆解助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>大学生拖延症拆解助手</h1>
    <p class="subtitle">把大任务拆成每日待办，提高学习效率</p>

    <!-- 输入区域 -->
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="输入任务，例如：完成数据库课设">
        <button id="addTaskBtn">添加任务</button>
    </div>

    <!-- 今日待办 -->
    <div class="task-list-section">
        <h2>今日待办</h2>
        <ul id="taskList"></ul>
    </div>

    <!-- 任务统计 -->
    <div class="task-summary">
        <span id="totalTasks">总任务：0</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
