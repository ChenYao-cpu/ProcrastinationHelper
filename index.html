<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>拖延症拆解助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>大学生拖延症拆解助手</h1>
        
        <!-- 输入任务 -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="输入任务，例如：完成数据库课设">
            <button id="addTaskBtn">添加任务</button>
        </div>

        <!-- 待办列表 -->
        <div class="task-list-section">
            <h2>今日待办</h2>
            <ul id="taskList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
